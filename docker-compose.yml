services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongo-data:/data/db
    ports:
      - "${MONGO_PORT}:27017"

  backend:
    build: ./Back/iot_arq_computadoras
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT}:3000"
    environment:
      - PORT=${BACKEND_PORT}
      - MONGO_URI=mongodb://${MONGO_HOST}:${MONGO_PORT}/${MONGO_DB}
      - BACKEND_MDNS_NAME=${BACKEND_MDNS_NAME}
      - BACKEND_MDNS_SERVICE_TYPE=${BACKEND_MDNS_SERVICE_TYPE}
      - ESP_BASE_URL=${ESP_BASE_URL}
      - ESP_TIMEOUT_MS=${ESP_TIMEOUT_MS}
    depends_on:
      - mongo

  frontend:
    build: ./Front/iot_arq_computadoras_front
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT}:4200"
    environment:
      - PORT=${FRONTEND_PORT}
      - BACKEND_URL=http://${BACKEND_HOST}:${BACKEND_PORT}
    depends_on:
      - backend

volumes:
  mongo-data:
